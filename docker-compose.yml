services:
  db:
    image: postgres:16-alpine
    container_name: ataxchile_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ataxchile_dev
    ports:
      - "5434:5432" # 5432 y 5433 ocupados por PostgreSQL local
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
